global:
  # Number of worker threads. Each worker gets its own SO_REUSEPORT listen
  # socket; the kernel distributes connections across them by 4-tuple hash.
  # "auto" = one worker per logical CPU. For best performance set this to
  # match the number of RSS queues on your NIC:
  #   ethtool -L eth0 combined <workers>
  workers: auto

  # Number of response-compression offload threads. 0 keeps gzip/brotli
  # synchronous in the io_uring worker thread (current default behavior).
  # 2-4 is a reasonable starting point when large HTML/JSON bodies dominate.
  compress_pool_threads: 0

  # io_uring SQPOLL: spawn a kernel thread per worker that continuously polls
  # the submission ring, eliminating the io_uring_enter() syscall on the hot
  # submit path. Requires CAP_SYS_ADMIN (already granted in the service unit).
  # Recommended for servers handling >50K req/s. The kernel thread sleeps
  # after 10ms of inactivity and wakes on the next submission (one syscall).
  sqpoll: false

  # hugepages: use 2MB huge pages for the per-connection I/O buffer slabs.
  # Reduces TLB pressure for the buffer pool (~370 MB/worker on a 2 GB VPS).
  # Requires vm.nr_hugepages to be set before starting vortex:
  #   echo 400 | sudo tee /proc/sys/vm/nr_hugepages   (400 × 2MB = 800 MB)
  # Falls back to THP (MADV_HUGEPAGE) if explicit huge pages are unavailable,
  # then plain mmap. Set to false to skip huge page allocation entirely.
  hugepages: false

  # cpu_affinity: pin worker N to CPU N.
  # Keeps each worker's io_uring ring, TLS state, and connection pool hot in
  # one core's L1/L2 cache. Falls back gracefully if the target CPU doesn't
  # exist (worker_id % nproc is used, so it always maps to a valid CPU).
  # Disable if you have other latency-sensitive processes that need specific
  # core placement and don't want vortex claiming whole cores.
  cpu_affinity: true
  # Listener mode. ipv4_only: true creates an AF_INET listener only.
  # Set ipv4_only: false with bind_address: "::" for a dual-stack listener
  # (native IPv6 plus IPv4-mapped connections on one socket).
  ipv4_only: true
  bind_address: "0.0.0.0"
  bind_port: 443
  http_port: 80
  interface: "eth0"
  log_level: "info"
  log_format: "json"
  pid_file: "/run/vortex.pid"
  max_request_body_mb: 8

tls:
  min_version: "1.2"
  max_version: "1.3"
  ciphersuites: "TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384"
  session_timeout: 3600
  session_ticket_rotation: 3600
  ktls: true

xdp:
  mode: "auto"
  rate_limit:
    enabled: true
    requests_per_second: 1000
    burst: 2000
  blocklist_file: "/etc/vortex/blocklist.txt"  # One IPv4 or IPv6 literal per line

cache:
  enabled: true
  # When true, ETags are derived from the first 8 bytes of SHA-256(body)
  # instead of xxhash64(body). OpenSSL uses SHA-NI automatically when the CPU
  # supports it.
  etag_sha256: false
  # When true, cached headers+body are verified with CRC32C before serving.
  # Corrupted cache entries are invalidated and treated as misses.
  verify_crc: false
  index_entries: 4096
  slab_size_mb: 64
  default_ttl: 300
  use_hugepages: true

acme:
  enabled: false
  email: "admin@example.com"
  directory_url: "https://acme-v02.api.letsencrypt.org/directory"
  account_key_path: "/etc/vortex/acme-account.key"
  storage_path: "/etc/vortex/certs/"
  renewal_days_before_expiry: 30
  preferred_challenge: "http-01"

metrics:
  enabled: true
  bind_address: "127.0.0.1"
  port: 9090
  path: "/metrics"

dashboard:
  enabled: true
  bind_address: "127.0.0.1"
  port: 9091

routes:
  - hostname: "api.example.com"
    backends:
      - address: "10.0.0.1:8080"
        weight: 3
      - address: "10.0.0.2:8080"
        weight: 1
    load_balancing: "weighted_round_robin"  # round_robin | weighted_round_robin | least_conn | ip_hash
    cert_provider: "static_file"            # static_file | acme_http01 | acme_dns01
    cert_path: "/etc/vortex/certs/api.example.com/fullchain.pem"
    key_path:  "/etc/vortex/certs/api.example.com/privkey.pem"

    # Backend connection settings
    backend_timeout_ms: 30000    # Max ms to wait for first byte from backend (0 = default 30000)
    # congestion_control: "bbr"  # TCP CC algorithm for backend sockets (empty = kernel default, e.g. cubic)
                                  # Check /proc/sys/net/ipv4/tcp_allowed_congestion_control

    # Circuit breaker
    # health:
    #   fail_threshold: 3        # Consecutive failures to open circuit (0 = default 3)
    #   open_ms: 10000           # ms to keep circuit open before retry probe (0 = default 10000)

    # Rate limiting (per source IP, applied before routing)
    # rate_limit:
    #   enabled: true
    #   rps: 100                 # Sustained requests per second
    #   burst: 200               # Initial burst allowance

    # Proxy-level HTTP Basic Auth
    # auth:
    #   enabled: true
    #   file: "/etc/vortex/auth/api-users.auth"
    #   users:
    #     - "admin:$scrypt$ln=15,r=8,p=1$AQIDBAUGBwgJCgsMDQ4PEA==$1b98GT+mgzwTa+tOSyi5AORw9EiZ0XG3ILt27KXWTzc="
    #     # Generate with: python3 tools/vortex-passwd.py <username>

    # Backend request header manipulation
    # x_api_key: ""              # Injected as X-Api-Key on backend requests
    # backend_auth: "block"      # block (default) | passthrough | rewrite
    #                            # block: strip Authorization before forwarding
    #                            # passthrough: forward Authorization unchanged
    #                            # rewrite: replace with backend_credentials
    # backend_credentials: ""    # "user:pass" injected as Authorization: Basic <b64>
    #                            # (implies backend_auth: rewrite when non-empty)
    # backend_headers:
    #   - name: "X-Internal-Token"
    #     action: "block"        # strip before forwarding
    #   - name: "X-Api-Version"
    #     action: "set"          # inject/replace with fixed value
    #     value: "v2"

    # Response header manipulation (headers sent to clients)
    # server_header: ""          # Override global Server header for this route.
    #                            # Empty = use global. "none" = pass backend's through.
    # response_headers:
    #   - name: "X-Powered-By"
    #     action: "block"        # strip from every response
    #   - name: "X-Frame-Options"
    #     action: "set"          # inject/replace with fixed value
    #     value: "DENY"

    cache:
      enabled: true
      ttl: 60
      key: "$host$uri"

  - hostname: "static.example.com"
    backends:
      - address: "10.0.0.3:8080"
    cert_provider: "static_file"
    cert_path: "/etc/vortex/certs/static.example.com/fullchain.pem"
    key_path: "/etc/vortex/certs/static.example.com/privkey.pem"
    cache:
      enabled: true
      ttl: 86400
