global:
  # Number of worker threads. Each worker gets its own SO_REUSEPORT listen
  # socket; the kernel distributes connections across them by 4-tuple hash.
  # "auto" = one worker per logical CPU. For best performance set this to
  # match the number of RSS queues on your NIC:
  #   ethtool -L eth0 combined <workers>
  workers: auto

  # io_uring SQPOLL: spawn a kernel thread per worker that continuously polls
  # the submission ring, eliminating the io_uring_enter() syscall on the hot
  # submit path. Requires CAP_SYS_ADMIN (already granted in the service unit).
  # Recommended for servers handling >50K req/s. The kernel thread sleeps
  # after 10ms of inactivity and wakes on the next submission (one syscall).
  sqpoll: false

  # hugepages: use 2MB huge pages for the per-connection I/O buffer slabs.
  # Reduces TLB pressure for the buffer pool (~370 MB/worker on a 2 GB VPS).
  # Requires vm.nr_hugepages to be set before starting vortex:
  #   echo 400 | sudo tee /proc/sys/vm/nr_hugepages   (400 × 2MB = 800 MB)
  # Falls back to THP (MADV_HUGEPAGE) if explicit huge pages are unavailable,
  # then plain mmap. Set to false to skip huge page allocation entirely.
  hugepages: false

  # cpu_affinity: pin worker N to CPU N.
  # Keeps each worker's io_uring ring, TLS state, and connection pool hot in
  # one core's L1/L2 cache. Falls back gracefully if the target CPU doesn't
  # exist (worker_id % nproc is used, so it always maps to a valid CPU).
  # Disable if you have other latency-sensitive processes that need specific
  # core placement and don't want vortex claiming whole cores.
  cpu_affinity: true
  bind_address: "0.0.0.0"
  bind_port: 443
  http_port: 80
  interface: "eth0"
  log_level: "info"
  log_format: "json"
  pid_file: "/run/vortex.pid"
  max_request_body_mb: 8

tls:
  min_version: "1.2"
  max_version: "1.3"
  ciphersuites: "TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384"
  session_timeout: 3600
  session_ticket_rotation: 3600
  ktls: true

xdp:
  mode: "auto"
  rate_limit:
    enabled: true
    requests_per_second: 1000
    burst: 2000
  blocklist_file: "/etc/vortex/blocklist.txt"

cache:
  enabled: true
  index_entries: 4096
  slab_size_mb: 64
  default_ttl: 300
  use_hugepages: true

acme:
  enabled: false
  email: "admin@example.com"
  directory_url: "https://acme-v02.api.letsencrypt.org/directory"
  account_key_path: "/etc/vortex/acme-account.key"
  storage_path: "/etc/vortex/certs/"
  renewal_days_before_expiry: 30
  preferred_challenge: "http-01"

metrics:
  enabled: true
  bind_address: "127.0.0.1"
  port: 9090
  path: "/metrics"

dashboard:
  enabled: true
  bind_address: "127.0.0.1"
  port: 9091

routes:
  - hostname: "api.example.com"
    backends:
      - address: "10.0.0.1:8080"
        weight: 3
      - address: "10.0.0.2:8080"
        weight: 1
    load_balancing: "weighted_round_robin"
    cert_provider: "static_file"
    cert_path: "/etc/vortex/certs/api.example.com/fullchain.pem"
    key_path: "/etc/vortex/certs/api.example.com/privkey.pem"
    cache:
      enabled: true
      ttl: 60
      key: "$host$uri"

  - hostname: "static.example.com"
    backends:
      - address: "10.0.0.3:8080"
    cert_provider: "static_file"
    cert_path: "/etc/vortex/certs/static.example.com/fullchain.pem"
    key_path: "/etc/vortex/certs/static.example.com/privkey.pem"
    cache:
      enabled: true
      ttl: 86400
